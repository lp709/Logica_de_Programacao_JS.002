	<head>

		<title>Aula 08 - Logica de Programacao</title>

	</head>

		<body>
			<h1>Olá</h1>
			<button onclick="hi()">English</button>

			<script>
				function hi() {
					let number = (5 > 2) && (2 < 5);
					const mensagem = "Hello there"

					if (number === true) {
						document.querySelector("h1").innerHTML = mensagem;
					}
				}
			</script>
		</body>
