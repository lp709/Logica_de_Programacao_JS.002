<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de programacao aula 6</title>
</head>

<body>

    <script>
        let n1 = prompt("Digite um numero");
        n1 = parseInt(n1);

        let n2 = prompt("Digite outro numero");
        n2 = parseInt(n2);
        
        window.alert(`O resultado é igual á: ${(n1 + n2)}`)
    </script>
</body>

</html>
